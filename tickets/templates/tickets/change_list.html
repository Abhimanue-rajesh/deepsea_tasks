{% extends "admin/change_list.html" %}
{% load i18n %}
{% block content %}
    {% if quick_copy_items %}
        <div class="mb-6">
            <div class="rounded-2xl  bg-white shadow-sm dark:border-gray-800 dark:bg-base-900">
                <div class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-4">
                    {% for item in quick_copy_items %}
                        <div class="group flex items-center justify-between gap-3 rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 transition-all hover:border-primary-500 hover:shadow-md dark:border-gray-700 dark:bg-base-800">
                            <div class="min-w-0 flex-1">
                                <div class="truncate text-sm font-semibold text-gray-900 dark:text-white">{{ item.title }}</div>
                                <div class="truncate text-xs text-gray-500 dark:text-gray-400">{{ item.content|truncatechars:80 }}</div>
                            </div>
                            <button type="button"
                                    class="quickcopy-btn inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-xl border border-gray-200 bg-white text-gray-600 transition hover:bg-primary-50 hover:text-primary-600 dark:border-gray-700 dark:bg-base-900 dark:text-gray-300"
                                    data-copy-text="{{ item.content|escapejs }}">
                                <span class="copy-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg"
                                         fill="none"
                                         viewBox="0 0 24 24"
                                         stroke-width="1.5"
                                         stroke="currentColor"
                                         class="h-5 w-5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125H4.875A1.125 1.125 0 013.75 20.625V9.75c0-.621.504-1.125 1.125-1.125H8.25m7.5-5.25h3.375c.621 0 1.125.504 1.125 1.125v10.875c0 .621-.504 1.125-1.125 1.125H9.375A1.125 1.125 0 018.25 15.375V4.5c0-.621.504-1.125 1.125-1.125H15.75z" />
                                    </svg>
                                </span>
                            </button>
                        </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    {% endif %}
    <div class="mb-3 rounded border border-base-200 bg-white p-4 shadow-sm dark:border-base-800 dark:bg-base-900">
        <form method="post" class="grid grid-cols-1 gap-4 md:grid-cols-7">
            {% csrf_token %}
            <input type="hidden" name="_quick_add_ticket" value="1">
            <div>
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">
                    Ticket number
                </label>
                <input type="number"
                       name="ticket_number"
                       class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
            </div>
            <div class="md:col-span-2">
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">
                    Ticket name
                </label>
                <input type="text"
                       name="ticket_name"
                       required
                       class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">Routing</label>
                <select name="routing"
                        class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
                    <option value="">---------</option>
                    {% for routing in ticket_routings %}<option value="{{ routing.id }}">{{ routing.name }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">Status</label>
                <select name="status"
                        class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
                    <option value="">---------</option>
                    {% for status in ticket_statuses %}<option value="{{ status.id }}">{{ status.name }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">Raised by</label>
                <input type="text"
                       name="raised_by"
                       class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
            </div>
            <div class="flex items-center justify-center">
                <button type="submit"
                        class="w-full h-10 rounded bg-primary-600 px-4 py-1.5 text-sm font-medium text-white hover:bg-primary-700">
                    Add ticket
                </button>
            </div>
        </form>
    </div>
    {{ block.super }}
{% endblock content %}
