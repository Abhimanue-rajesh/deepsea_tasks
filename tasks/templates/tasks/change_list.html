{% extends "admin/change_list.html" %}
{% load i18n %}
{% block content %}
    {% if selected_project %}
        <div class="mb-4 flex items-center justify-between rounded-lg">
            <div class="p-2">
                <p class="text-xs font-medium uppercase tracking-wide text-primary-600 dark:text-primary-400">Current Project</p>
                <h2 class="mt-1 text-lg font-semibold text-font-important-light dark:text-font-important-dark">
                    {{ selected_project.name }}
                </h2>
            </div>
        </div>
        <input type="hidden" name="project" value="{{ selected_project.id }}">
    {% endif %}
    <div class="mb-3 rounded border border-base-200 bg-white p-4 shadow-sm dark:border-base-800 dark:bg-base-900">
        <form method="post" class="grid grid-cols-12 gap-4 items-end">
            {% csrf_token %}
            <input type="hidden" name="_quick_add_task" value="1">
            <!-- Title -->
            <div class="col-span-12 lg:col-span-3">
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">Title</label>
                <input type="text"
                       name="title"
                       required
                       class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
            </div>
            <!-- Priority -->
            <div class="col-span-6 lg:col-span-1">
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">Priority</label>
                <select name="priority"
                        required
                        class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
                    <option value="">---------</option>
                    {% for value, label in task_priorities %}<option value="{{ value }}">{{ label }}</option>{% endfor %}
                </select>
            </div>
            <!-- Status -->
            <div class="col-span-6 lg:col-span-2">
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">Status</label>
                <select name="status"
                        class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
                    {% for value, label in task_statuses %}
                        <option value="{{ value }}"
                                {% if value == "not_started" %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <!-- Due Date -->
            <div class="col-span-6 lg:col-span-2">
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">Due Date</label>
                <input type="date"
                       name="due_date"
                       value="{{ today|date:'Y-m-d' }}"
                       required
                       class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
            </div>
            <!-- Category -->
            <div class="col-span-6 lg:col-span-2">
                <label class="mb-2 block text-sm font-medium text-font-important-light dark:text-font-important-dark">Category</label>
                <select name="category"
                        class="w-full rounded border border-base-200 bg-white px-3 py-2 text-sm dark:border-base-700 dark:bg-base-900">
                    <option value="">---------</option>
                    {% for category in task_categories %}<option value="{{ category.id }}">{{ category.name }}</option>{% endfor %}
                </select>
            </div>
            <!-- Button -->
            <div class="col-span-12 lg:col-span-2 self-center flex">
                <button type="submit"
                        class="w-full h-10 rounded bg-primary-600 px-4 py-1.5 text-sm font-medium text-white hover:bg-primary-700">
                    Add
                </button>
            </div>
        </form>
    </div>
    {{ block.super }}
{% endblock content %}
